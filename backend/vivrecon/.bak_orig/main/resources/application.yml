spring:
  application:
    name: vivrecon

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vivrecon}
    username: ${admin}
    password: ${Sergei42}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always

vivrecon:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars!!}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-days: 30

logging:
  level:
    com.vivrecon: DEBUG
    org.springframework.security: INFO