version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vivrecon
      POSTGRES_USER: vivrecon
      POSTGRES_PASSWORD: vivrecon
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: .
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/vivrecon
      DB_USER: vivrecon
      DB_PASS: vivrecon
      JWT_SECRET: ${JWT_SECRET:-change-me-local-only-not-for-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8080:8080"
    


volumes:
  pg_data:
