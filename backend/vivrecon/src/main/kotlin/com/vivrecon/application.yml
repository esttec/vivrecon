spring:
  application:
    name: vivrecon

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vivrecon}
    username: ${DB_USER:vivrecon}
    password: ${DB_PASS:vivrecon}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  error:
    include-message: always

vivrecon:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars!!}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-days: 30

  oauth:
    google:
      # Your Google OAuth 2.0 client ID from https://console.cloud.google.com
      client-id: ${GOOGLE_CLIENT_ID:}

    apple:
      # Your Apple Service ID (e.g. com.yourcompany.vivrecon.service)
      # from https://developer.apple.com/account/resources/identifiers/list/serviceId
      client-id: ${APPLE_CLIENT_ID:}

    facebook:
      # From https://developers.facebook.com/apps
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}

logging:
  level:
    com.vivrecon: DEBUG
    org.springframework.security: INFO
