spring:
  datasource:
    url: jdbc:h2:mem:vivrecon_test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

vivrecon:
  jwt:
    secret: test-secret-must-be-at-least-32-characters-long-for-hs256!!
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 30

  oauth:
    google:
      client-id: test-google-client
    apple:
      client-id: test-apple-client
    facebook:
      app-id: test-fb-id
      app-secret: test-fb-secret
