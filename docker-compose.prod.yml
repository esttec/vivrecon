# Production stack for vivrecon.com — database + backend + frontend + HTTPS proxy.
# Secrets come from a .env file that sits next to this file (never commit .env).
# Run with:  docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vivrecon
      POSTGRES_USER: vivrecon
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend/vivrecon
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/vivrecon
      DB_USER: vivrecon
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY}
      APP_BASE_URL: https://vivrecon.com
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pg_data:
  caddy_data:
  caddy_config:
