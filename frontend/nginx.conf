server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: send unknown routes to index.html so React Router works
    # (e.g. /premium, /terms, /budget on a hard refresh).
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets aggressively.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
